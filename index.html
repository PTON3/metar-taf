<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>METAR Dashboard</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #000000;
    --fg: #e6e6e6;
    --muted: #b3b3b3;
    --card: #0b0b0b;
    --border: #1f1f1f;
    --ok: #00c853;        /* VFR */
    --warn: #ffd600;      /* MVFR-ish accent */
    --mvfr: #2979ff;      /* MVFR */
    --ifr: #ff3d00;       /* IFR */
    --lifr: #e040fb;      /* LIFR */
  }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji","Segoe UI Emoji";
    min-height: 100vh;
  }
  .wrap {
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 16px;
    box-sizing: border-box;
  }
  .card {
    width: 100%;
    max-width: 820px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45);
  }
  .stripe {
    height: 8px;
    background: var(--ok);
  }
  .inner {
    padding: 16px 18px 18px;
  }
  .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .icao {
    font-weight: 700;
    font-size: clamp(28px, 5vw, 40px);
    letter-spacing: 0.04em;
  }
  .when {
    color: var(--muted);
    font-size: 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 12px;
    margin-top: 12px;
  }
  @media (max-width: 680px) {
    .grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  }
  .tile {
    background: #0f0f0f;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
  }
  .label {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .value {
    margin-top: 6px;
    font-size: 20px;
    font-weight: 600;
  }
  .sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }
  .clouds {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 6px;
    font-feature-settings: "tnum";
  }
  .raw {
    margin-top: 14px;
    padding: 12px;
    background: #0f0f0f;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 14px;
    line-height: 1.3;
    word-break: break-word;
  }
  .footer {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  /* scale/zoom support via data-scale attribute */
  [data-scale] {
    transform-origin: top left;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div id="root" class="card" data-scale="1">
      <div id="stripe" class="stripe"></div>
      <div class="inner">
        <div class="head">
          <div class="icao" id="icao">----</div>
          <div class="when" id="when">—</div>
        </div>

        <div class="grid">
          <div class="tile">
            <div class="label">Temp / Dew</div>
            <div class="value" id="tempdew">—</div>
            <div class="sub" id="tempdewSub">°F / °F</div>
          </div>
          <div class="tile">
            <div class="label">Wind</div>
            <div class="value" id="wind">—</div>
            <div class="sub" id="windSub">kt</div>
          </div>
          <div class="tile">
            <div class="label">Visibility</div>
            <div class="value" id="vis">—</div>
            <div class="sub">SM</div>
          </div>
          <div class="tile">
            <div class="label">Altimeter</div>
            <div class="value" id="alt">—</div>
            <div class="sub">inHg</div>
          </div>
          <div class="tile" style="grid-column: span 2;">
            <div class="label">Clouds</div>
            <div class="clouds" id="clouds">
              <div class="sub">—</div>
            </div>
          </div>
          <div class="tile" style="grid-column: span 2;">
            <div class="label">Flight Category</div>
            <div class="value" id="cat">—</div>
            <div class="sub" id="catSub">Based on METAR</div>
          </div>
        </div>

        <div class="raw" id="raw">METAR —</div>

        <div class="footer">
          <div id="src">Source: aviationweather.gov ADDS</div>
          <div id="updated">Updated: —</div>
        </div>
      </div>
    </div>
  </div>

<script>
/* ========= Config via URL =========
   ?station=KFCM     -> ICAO code
   ?hours=2          -> look-back hours (ADDS)
   ?scale=1.05       -> visual scaling (like zoom)
*/
const qp = new URLSearchParams(location.search);
const STATION = (qp.get("station") || "KFCM").toUpperCase().trim();
const HOURS  = Math.max(1, Math.min(12, Number(qp.get("hours") || 2)));
const SCALE  = Math.max(0.5, Math.min(2, Number(qp.get("scale") || 1)));

document.getElementById("root").style.transform = `scale(${SCALE})`;

const API = `https://aviationweather.gov/adds/dataserver_current/httpparam?datasource=metars&requestType=retrieve&format=JSON&stationString=${encodeURIComponent(STATION)}&hoursBeforeNow=${HOURS}`;

const el = {
  stripe: document.getElementById("stripe"),
  icao: document.getElementById("icao"),
  when: document.getElementById("when"),
  tempdew: document.getElementById("tempdew"),
  tempdewSub: document.getElementById("tempdewSub"),
  wind: document.getElementById("wind"),
  windSub: document.getElementById("windSub"),
  vis: document.getElementById("vis"),
  alt: document.getElementById("alt"),
  clouds: document.getElementById("clouds"),
  cat: document.getElementById("cat"),
  catSub: document.getElementById("catSub"),
  raw: document.getElementById("raw"),
  updated: document.getElementById("updated")
};

function cToF(c){ return (c * 9/5) + 32; }
function ktStr(dir, spd, gust){
  if (spd === 0 || isNaN(spd)) return "Calm";
  const d = isNaN(dir) ? "VRB" : String(dir).padStart(3, "0");
  return gust ? `${d}° @ ${spd}G${gust} kt` : `${d}° @ ${spd} kt`;
}
function fmtVisSM(v){
  if (v == null || isNaN(v)) return "—";
  // Keep 1 decimal unless it's >=10
  return v >= 10 ? `${Math.round(v)} SM` : `${(+v).toFixed(1)} SM`;
}
function fmtAlt(inHg){
  if (inHg == null || isNaN(inHg)) return "—";
  return inHg.toFixed(2);
}
function zToLocal(zstr){
  // ADDS provides "observation_time": "2025-09-27T18:35:00Z"
  const d = new Date(zstr);
  if (isNaN(+d)) return "—";
  return d.toLocaleString([], {hour12:false});
}
function catColor(cat){
  switch((cat||"").toUpperCase()){
    case "VFR": return getComputedStyle(document.documentElement).getPropertyValue('--ok');
    case "MVFR": return getComputedStyle(document.documentElement).getPropertyValue('--mvfr');
    case "IFR": return getComputedStyle(document.documentElement).getPropertyValue('--ifr');
    case "LIFR": return getComputedStyle(document.documentElement).getPropertyValue('--lifr');
    default: return getComputedStyle(document.documentElement).getPropertyValue('--warn');
  }
}
function buildClouds(layers){
  if (!layers || !layers.length) return "<div class='sub'>No significant clouds</div>";
  return layers.map(l => {
    const cover = (l.sky_cover||"").toUpperCase();
    const h = l.base_ft_agl != null ? `${l.base_ft_agl} ft AGL` : "";
    return `<div>${cover}${h ? " • " + h : ""}</div>`;
  }).join("");
}

async function loadMETAR(){
  try{
    const res = await fetch(API, { cache: "no-store" });
    if (!res.ok) throw new Error("Network error");
    const data = await res.json();
    const arr = data?.response?.data?.METAR || [];
    if (!arr.length) throw new Error("No METAR found");

    // Use the latest record
    const m = arr[0];

    // Populate
    el.icao.textContent = STATION;
    el.when.textContent = zToLocal(m.observation_time || m.raw_text?.match(/\d{2}\d{2}\d{2}Z/)?.[0]) + " (local)";
    const tC = Number(m.temp_c);
    const dC = Number(m.dewpoint_c);
    const tF = isNaN(tC) ? null : Math.round(cToF(tC));
    const dF = isNaN(dC) ? null : Math.round(cToF(dC));
    el.tempdew.textContent = (tF??"—") + "° / " + (dF??"—") + "°";
    el.tempdewSub.textContent = (isNaN(tC)||isNaN(dC)) ? "°F / °F" : `${tC.toFixed(1)}°C / ${dC.toFixed(1)}°C`;

    const wind = ktStr(Number(m.wind_dir_degrees), Number(m.wind_speed_kt), Number(m.wind_gust_kt));
    el.wind.textContent = wind;
    el.windSub.textContent = m.wind_dir_degrees != null ? "dir° / kt" : "kt";

    el.vis.textContent = fmtVisSM(Number(m.visibility_statute_mi) || Number(m.vert_vis_ft) ? Number(m.visibility_statute_mi) : NaN);

    el.alt.textContent = fmtAlt(Number(m.altim_in_hg));

    const clouds = Array.isArray(m.sky_condition) ? m.sky_condition
                  : (m.sky_condition ? [m.sky_condition] : []);
    el.clouds.innerHTML = buildClouds(clouds);

    const cat = (m.flight_category || "—").toUpperCase();
    el.cat.textContent = cat;
    el.catSub.textContent = "Based on ceiling/visibility";
    el.stripe.style.background = catColor(cat);

    el.raw.textContent = m.raw_text || "—";
    el.updated.textContent = "Updated: " + new Date().toLocaleTimeString([], {hour12:false});
  } catch (err){
    el.raw.textContent = "Error loading METAR. " + err.message;
    el.stripe.style.background = "var(--warn)";
    el.icao.textContent = STATION;
    el.when.textContent = "—";
  }
}

// Initial load + refresh every 5 minutes
loadMETAR();
setInterval(loadMETAR, 5 * 60 * 1000);
</script>
</body>
</html>
